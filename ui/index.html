<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krs Scripts Pause Menu</title>
    <link rel="stylesheet" href="../ui/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://kit.fontawesome.com/976789b613.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <script src="../ui/script.js" type="text/javascript"></script>
</head>
<body style="display: none;">
    <div class="contenitore_pausamenu">
        <div class="title">
            <h3><i class="fa-solid fa-dice"></i> Krs Scripts</h3>
        </div>

        <div class="grid-container">
            <div class="contenitore_mappa">
                <h3><i class="fa-solid fa-map-location-dot"></i> Map</h3>
                <div class="map-image"></div>
            </div>

            <div class="contenitore_info_player">
                <h3><i class="fa-solid fa-circle-info"></i> Player Info</h3>
            
                <div class="player-info-item">
                    <i class="fas fa-user"></i> <strong>Name:</strong> Karos
                </div>
                <div class="player-info-item">
                    <i class="fas fa-briefcase"></i> <strong>Job:</strong> unemployed
                </div>
                <div class="player-info-item">
                    <i class="fas fa-venus-mars"></i> <strong>Gender:</strong> Male
                </div>
                <div class="player-info-item">
                    <i class="fa-solid fa-piggy-bank"></i> <strong>Balance:</strong> $1000
                </div>
                <div class="player-info-item">
                    <i class="fas fa-dollar-sign"></i> <strong>Wallet:</strong> $1000
                </div>
                <div class="player-info-item">
                    <i class="fa-solid fa-sack-dollar"></i> <strong>Dirty:</strong> $1000 
                </div>
            </div>
        </div>

        <div class="button-container">
            <div class="contenitore_settings">
                <h4><i class="fa-solid fa-cog"></i> Settings</h4>
                <p class="description">Manage your settings.</p>
            </div>
            
            <div class="contenitore_relog">
                <h4><i class="fa-solid fa-rotate"></i> Relog</h4>
                <p class="description">Relog Player</p>
            </div>
            
            <div class="contenitore_logout">
                <h4><i class="fa-solid fa-sign-out-alt"></i> Logout</h4>
                <p class="description">Disconnect from the server.</p>
            </div>            
        </div>
    </div>
</body>

</html>
